services:
  semops-nats:
    image: nats:2.12-alpine
    command:
      - "-js"
      - "-sd"
      - "/data"
      - "-m"
      - "8222"
      - "--name"
      - "semops-cop-nats"
    ports:
      - "${SEMOPS_NATS_HOST_PORT:-4222}:4222"
      - "${SEMOPS_NATS_MON_HOST_PORT:-8222}:8222"
    volumes:
      - semops-nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  semstreams:
    image: c360studio/semstreams:semops-graph
    build:
      context: ${SEMSTREAMS_ROOT:-../semstreams}
      dockerfile: docker/Dockerfile
      target: production
    command:
      - "--config"
      - "/app/configs/graph-backend.json"
      - "--log-level"
      - "info"
      - "--log-format"
      - "text"
      - "--health-port"
      - "8081"
    depends_on:
      semops-nats:
        condition: service_healthy
    environment:
      SEMSTREAMS_NATS_URLS: nats://semops-nats:4222
      SEMSTREAMS_CONFIG: /app/configs/graph-backend.json
    volumes:
      - ${SEMSTREAMS_ROOT:-../semstreams}/configs:/app/configs:ro
    ports:
      - "${SEMOPS_SEMSTREAMS_HEALTH_HOST_PORT:-18080}:8081"
      - "${SEMOPS_SEMSTREAMS_METRICS_HOST_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/healthz"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 10s

  semops:
    image: c360studio/semops:cop-local
    build:
      context: .
      dockerfile: Dockerfile
      target: ${SEMOPS_DOCKER_TARGET:-production}
      additional_contexts:
        semstreams: ${SEMSTREAMS_ROOT:-../semstreams}
    depends_on:
      semstreams:
        condition: service_healthy
    environment:
      SEMOPS_NATS_URL: nats://semops-nats:4222
      SEMOPS_NATS_NAME: semops-cop
      SEMOPS_API_ADDR: :8088
      SEMOPS_MAVLINK_ENABLED: "true"
      SEMOPS_MAVLINK_SOURCE: mavlink:compose
      SEMOPS_COT_ENABLED: "true"
      SEMOPS_COT_SOURCE: tak-cot:compose
      SEMOPS_CAP_ENABLED: "${SEMOPS_CAP_ENABLED:-false}"
      SEMOPS_CAP_SOURCE: cap:http:compose
      SEMOPS_CAP_REPLAY_PATH: "${SEMOPS_CAP_REPLAY_PATH:-}"
      SEMOPS_CAP_HTTP_URL: "${SEMOPS_CAP_HTTP_URL:-http://semops-feed-fixtures:8091/cap/alert}"
      SEMOPS_CAP_HTTP_POLL_INTERVAL: "${SEMOPS_CAP_HTTP_POLL_INTERVAL:-5m}"
      SEMOPS_CAP_HTTP_STALE_AFTER: "${SEMOPS_CAP_HTTP_STALE_AFTER:-15m}"
      SEMOPS_CAP_HTTP_CONTACT_POLICY: "${SEMOPS_CAP_HTTP_CONTACT_POLICY:-}"
      SEMOPS_ADSB_ENABLED: "${SEMOPS_ADSB_ENABLED:-false}"
      SEMOPS_ADSB_SOURCE: adsb:opensky:compose
      SEMOPS_ADSB_REPLAY_PATH: "${SEMOPS_ADSB_REPLAY_PATH:-}"
      SEMOPS_ADSB_HTTP_URL: "${SEMOPS_ADSB_HTTP_URL:-http://semops-feed-fixtures:8091/adsb/states}"
      SEMOPS_ADSB_HTTP_POLL_INTERVAL: "${SEMOPS_ADSB_HTTP_POLL_INTERVAL:-2m}"
      SEMOPS_ADSB_HTTP_STALE_AFTER: "${SEMOPS_ADSB_HTTP_STALE_AFTER:-8m}"
      SEMOPS_ADSB_HTTP_CONTACT_POLICY: "${SEMOPS_ADSB_HTTP_CONTACT_POLICY:-}"
      SEMOPS_SAPIENT_ENABLED: "${SEMOPS_SAPIENT_ENABLED:-false}"
      SEMOPS_SAPIENT_GRAPH_ENABLED: "${SEMOPS_SAPIENT_GRAPH_ENABLED:-false}"
      SEMOPS_SAPIENT_SOURCE: sapient:http:compose
      SEMOPS_SAPIENT_REPLAY_PATH: "${SEMOPS_SAPIENT_REPLAY_PATH:-}"
      SEMOPS_SAPIENT_HTTP_URL: "${SEMOPS_SAPIENT_HTTP_URL:-http://semops-feed-fixtures:8091/sapient/messages}"
      SEMOPS_SAPIENT_HTTP_METHOD: "${SEMOPS_SAPIENT_HTTP_METHOD:-GET}"
      SEMOPS_SAPIENT_HTTP_POLL_INTERVAL: "${SEMOPS_SAPIENT_HTTP_POLL_INTERVAL:-2m}"
      SEMOPS_SAPIENT_HTTP_STALE_AFTER: "${SEMOPS_SAPIENT_HTTP_STALE_AFTER:-8m}"
      SEMOPS_SAPIENT_HTTP_CONTACT_POLICY: "${SEMOPS_SAPIENT_HTTP_CONTACT_POLICY:-}"
      SEMOPS_SAPIENT_HTTP_ENCODING: "${SEMOPS_SAPIENT_HTTP_ENCODING:-json}"
      SEMOPS_SAPIENT_WRITE_TIMEOUT: "${SEMOPS_SAPIENT_WRITE_TIMEOUT:-2s}"
      SEMOPS_KLV_ENABLED: "${SEMOPS_KLV_ENABLED:-false}"
      SEMOPS_KLV_SOURCE: "${SEMOPS_KLV_SOURCE:-klv:deterministic:compose}"
      SEMOPS_KLV_MEDIA_PATH: "${SEMOPS_KLV_MEDIA_PATH:-/var/lib/semops/klv}"
      SEMOPS_KLV_MEDIA_PATTERN: "${SEMOPS_KLV_MEDIA_PATTERN:-*.ts}"
      SEMOPS_KLV_WRITE_TIMEOUT: "${SEMOPS_KLV_WRITE_TIMEOUT:-2s}"
      SEMOPS_KLV_DEMUX_MAX_PACKET_BYTES: "${SEMOPS_KLV_DEMUX_MAX_PACKET_BYTES:-65536}"
      SEMOPS_KLV_DEMUX_MAX_EXTRACT_BYTES: "${SEMOPS_KLV_DEMUX_MAX_EXTRACT_BYTES:-262144}"
      SEMOPS_KLV_DEMUX_MAX_PACKETS: "${SEMOPS_KLV_DEMUX_MAX_PACKETS:-16}"
      SEMOPS_KLV_DEMUX_MAX_MATERIALIZED_BYTES: "${SEMOPS_KLV_DEMUX_MAX_MATERIALIZED_BYTES:-1048576}"
      SEMOPS_KLV_DEMUX_PROBE_OUTPUT_MAX_BYTES: "${SEMOPS_KLV_DEMUX_PROBE_OUTPUT_MAX_BYTES:-32768}"
      SEMOPS_KLV_DECODE_MAX_PACKET_BYTES: "${SEMOPS_KLV_DECODE_MAX_PACKET_BYTES:-65536}"
      SEMOPS_WEATHER_ENABLED: "${SEMOPS_WEATHER_ENABLED:-false}"
      SEMOPS_WEATHER_SOURCE: "${SEMOPS_WEATHER_SOURCE:-weather:fixture:compose}"
      SEMOPS_WEATHER_PROVIDER: "${SEMOPS_WEATHER_PROVIDER:-open-meteo}"
      SEMOPS_WEATHER_QUERY_SHAPE: "${SEMOPS_WEATHER_QUERY_SHAPE:-position}"
      SEMOPS_WEATHER_FIXTURE_PATH: "${SEMOPS_WEATHER_FIXTURE_PATH:-/fixtures/weather/open-meteo-point.json}"
      SEMOPS_WEATHER_WRITE_TIMEOUT: "${SEMOPS_WEATHER_WRITE_TIMEOUT:-2s}"
      SEMOPS_WEATHER_FRESHNESS: "${SEMOPS_WEATHER_FRESHNESS:-30m}"
      SEMOPS_WEATHER_MAX_OBSERVATIONS: "${SEMOPS_WEATHER_MAX_OBSERVATIONS:-64}"
      SEMOPS_FUSION_ENABLED: "${SEMOPS_FUSION_ENABLED:-false}"
      SEMOPS_FUSION_CANDIDATES_ENABLED: "${SEMOPS_FUSION_CANDIDATES_ENABLED:-false}"
      SEMOPS_FUSION_CANDIDATE_SUBJECT: "${SEMOPS_FUSION_CANDIDATE_SUBJECT:-semops.fusion.track_candidates}"
      SEMOPS_FUSION_CANDIDATE_SOURCES: "${SEMOPS_FUSION_CANDIDATE_SOURCES:-mavlink,tak,adsb,sapient}"
      SEMOPS_FUSION_CANDIDATE_POLL_INTERVAL: "${SEMOPS_FUSION_CANDIDATE_POLL_INTERVAL:-5s}"
      SEMOPS_FUSION_CANDIDATE_QUERY_TIMEOUT: "${SEMOPS_FUSION_CANDIDATE_QUERY_TIMEOUT:-2s}"
      SEMOPS_FUSION_CANDIDATE_LIMIT_PER_SOURCE: "${SEMOPS_FUSION_CANDIDATE_LIMIT_PER_SOURCE:-64}"
      SEMOPS_FUSION_CANDIDATE_MAX_COMPARISONS: "${SEMOPS_FUSION_CANDIDATE_MAX_COMPARISONS:-256}"
      SEMOPS_FUSION_CANDIDATE_MAX_BATCHES: "${SEMOPS_FUSION_CANDIDATE_MAX_BATCHES:-32}"
      SEMOPS_FUSION_ASSOCIATION_MAX_DISTANCE_METERS: "${SEMOPS_FUSION_ASSOCIATION_MAX_DISTANCE_METERS:-250}"
      SEMOPS_FUSION_ASSOCIATION_MAX_TIME_DELTA: "${SEMOPS_FUSION_ASSOCIATION_MAX_TIME_DELTA:-10s}"
      SEMOPS_FUSION_ASSOCIATION_MAX_OBSERVATION_AGE: "${SEMOPS_FUSION_ASSOCIATION_MAX_OBSERVATION_AGE:-30s}"
      SEMOPS_FUSION_ASSOCIATION_SOURCE_PRIORITY: "${SEMOPS_FUSION_ASSOCIATION_SOURCE_PRIORITY:-mavlink,tak,adsb,sapient}"
      SEMOPS_FUSION_ASSOCIATION_MIN_CONFIDENCE: "${SEMOPS_FUSION_ASSOCIATION_MIN_CONFIDENCE:-0.65}"
      SEMOPS_FUSION_ASSOCIATION_AMBIGUITY_MARGIN: "${SEMOPS_FUSION_ASSOCIATION_AMBIGUITY_MARGIN:-0.05}"
      SEMOPS_FUSION_WRITE_TIMEOUT: "${SEMOPS_FUSION_WRITE_TIMEOUT:-2s}"
      SEMOPS_ORG: c360
      SEMOPS_PLATFORM: edge-compose
      SEMOPS_TRACE_ID: semops-compose
      SEMOPS_MAVLINK_WRITE_TIMEOUT: "${SEMOPS_MAVLINK_WRITE_TIMEOUT:-5s}"
      SEMOPS_MAVLINK_UDP_LISTEN_ADDR: :14550
      SEMOPS_COT_WRITE_TIMEOUT: "${SEMOPS_COT_WRITE_TIMEOUT:-5s}"
      SEMOPS_COT_UDP_LISTEN_ADDR: :18090
      SEMOPS_CAP_WRITE_TIMEOUT: "${SEMOPS_CAP_WRITE_TIMEOUT:-5s}"
      SEMOPS_ADSB_WRITE_TIMEOUT: "${SEMOPS_ADSB_WRITE_TIMEOUT:-5s}"
      SEMOPS_COP_MAVLINK_SYSTEM_IDS: "${SEMOPS_COP_MAVLINK_SYSTEM_IDS:-42}"
    ports:
      - "${SEMOPS_API_HOST_PORT:-8088}:8088"
      - "${SEMOPS_MAVLINK_UDP_HOST_PORT:-14550}:14550/udp"
      - "${SEMOPS_COT_UDP_HOST_PORT:-18090}:18090/udp"
    volumes:
      - ${SEMOPS_KLV_MEDIA_HOST_PATH:-./fixtures/klv}:/var/lib/semops/klv:ro

  semops-feed-fixtures:
    image: c360studio/semops:cop-local
    entrypoint: ["/usr/local/bin/semops-feed-fixtures"]
    environment:
      SEMOPS_FEED_FIXTURES_ADDR: :8091
    ports:
      - "${SEMOPS_FEED_FIXTURES_HOST_PORT:-8091}:8091"

  semops-ui:
    image: c360studio/semops-ui:cop-local
    build:
      context: ./ui
      dockerfile: Dockerfile
    depends_on:
      semops:
        condition: service_started
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      ORIGIN: "${SEMOPS_COP_ORIGIN:-http://localhost:8080}"

  semops-scenario-runner:
    image: c360studio/semops:cop-local
    entrypoint: ["/usr/local/bin/semops-scenario-runner"]
    depends_on:
      semstreams:
        condition: service_healthy
      semops:
        condition: service_started
    environment:
      SEMOPS_NATS_URL: nats://semops-nats:4222
      SEMOPS_NATS_NAME: semops-scenario-runner
      SEMOPS_SCENARIO_ADDR: :8090
      SEMOPS_SCENARIO_MODE: "${SEMOPS_SCENARIO_MODE:-product}"
      SEMOPS_SCENARIO_ADSB_FIXTURE: "${SEMOPS_SCENARIO_ADSB_FIXTURE:-false}"
      SEMOPS_SCENARIO_MAVLINK_UDP_ADDR: "${SEMOPS_SCENARIO_MAVLINK_UDP_ADDR:-semops:14550}"
      SEMOPS_SCENARIO_COT_UDP_ADDR: "${SEMOPS_SCENARIO_COT_UDP_ADDR:-semops:18090}"
      SEMOPS_SCENARIO_READY_URL: "${SEMOPS_SCENARIO_READY_URL:-http://semops:8088/healthz}"
      SEMOPS_SCENARIO_READY_TIMEOUT: "${SEMOPS_SCENARIO_READY_TIMEOUT:-60s}"
      SEMOPS_SCENARIO_CHECKPOINT_MANIFEST: "${SEMOPS_SCENARIO_CHECKPOINT_MANIFEST:-/scenarios/phase1-hadr.checkpoints.json}"
      SEMOPS_MAVLINK_ENABLED: "true"
      SEMOPS_MAVLINK_SOURCE: mavlink:scenario
      SEMOPS_COT_ENABLED: "true"
      SEMOPS_COT_SOURCE: tak-cot:scenario
      SEMOPS_ORG: c360
      SEMOPS_PLATFORM: edge-compose
      SEMOPS_TRACE_ID: semops-scenario
      SEMOPS_MAVLINK_WRITE_TIMEOUT: "${SEMOPS_MAVLINK_WRITE_TIMEOUT:-5s}"
      SEMOPS_COT_WRITE_TIMEOUT: "${SEMOPS_COT_WRITE_TIMEOUT:-5s}"
    ports:
      - "${SEMOPS_SCENARIO_HOST_PORT:-8090}:8090"

  caddy:
    image: caddy:2-alpine
    depends_on:
      semops:
        condition: service_started
      semops-ui:
        condition: service_started
    ports:
      - "${SEMOPS_CADDY_HOST_PORT:-8080}:8080"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

volumes:
  semops-nats-data:
