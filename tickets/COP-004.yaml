ticket: COP-004
title: Stand up the containerized structural COP stack
assigned: go-developer
depends_on: [COP-001, COP-002, COP-003, COP-007, COP-008]
blocks: [COP-005, COP-006, COP-009]
status: ready
reviewer: go-reviewer
openspec_change: revive-cop-product

scope:
  - Add a first Compose stack with NATS, SemStreams structural services, SemOps API, UI, scenario runner,
    MAVLink adapter, TAK/CoT adapter, and CAP adapter.
  - Gate each adapter on parser, mock/simulator, projection, replay, and indexing-profile evidence.
  - Keep SemConnect out of the critical path for Phase 1, but leave a documented extension point.
  - Add health endpoints for services and active polling checks for long-running demo runs.

acceptance:
  - One command starts the structural demo stack locally.
  - Health checks prove NATS, SemStreams, SemOps API, and the scenario runner are alive.
  - The scenario runner produces visible graph writes from at least two feed types.
  - Logs and metrics distinguish raw ingest, projection writes, rules, and COP API state.
  - Feed graph writes declare expected indexing profiles and do not create graph entities per raw packet.
  - Smoke tests prove feed adapters create entities before updates or ADR-056 foreign-edge writes.
  - Hosted feed services declare SemStreams input/processor lifecycle, flowgraph, payload-registry, port,
    config-schema, health, and flow-metric surfaces before they are treated as framework-managed components.
  - A generated/replay MAVLink smoke clears the ADR-055/056 must-exist graph gate before UI or second-feed expansion.
  - Adversarial Phase 1 review has challenged demo credibility, monitoring, and graph/index cardinality.

tdd:
  - Add a smoke test that polls health and graph state instead of relying only on logs.
  - Avoid arbitrary sleeps; use explicit readiness and state polling.

progress:
  - Added `internal/adapters/mavlink` as an in-process adapter harness that composes parser, bounded raw lane,
    projector, and graph plan writer.
  - Harness tests prove valid telemetry captures raw bytes, projects current state, writes graph plans, and exposes
    pollable health counters without sleeps.
  - Harness tests also prove unsupported command ACK frames are captured without graph writes and corrupt frames never
    reach the graph writer.
  - Added a file-backed MAVLink replay store that appends raw-lane records as JSON Lines and loads them back into
    parseable frame records.
  - Added `internal/graphrequest.NATSRequester` so graph writers use SemStreams `RequestWithRetry` for mutation
    request/reply instead of bare query-style requests.
  - Added a SemStreams component-boundary contract guard and removed the stale StreamKit-era robotics flow config so
    hosted feed services must move toward input/processor lifecycle, flowgraph, payload-registry, port/config surfaces
    instead of raw subject plumbing.
  - Added `internal/components/mavlink` as the first concrete SemStreams flow component package, with UDP input,
    raw-frame decoder processor, graph projector processor, registered raw/decoded payloads, flowgraph-connectable
    stream ports, graph request ports, config schema, health, and flow metrics.
  - Rewired hosted `cmd/semops` MAVLink UDP ingestion onto the component flow so projector and decoder processors
    subscribe before the UDP input starts accepting native frames.
  - Recorded SemStreams utility package reuse as part of framework compliance: `natsclient`, `pkg/errs`,
    `pkg/cache`, and `pkg/buffer` should be evaluated before SemOps-local helper packages grow.
  - Added `internal/stack.NewMAVLinkAdapter` as a structural wiring factory for parser, raw lane, projector,
    retry-aware NATS requester, graph writer, adapter harness, and health state.
  - SemOps issue #1 triage prioritizes a generated/replay MAVLink live graph smoke before PX4/SITL, UI, or
    second-feed expansion.
  - Added `internal/smoke/mavlink` as the skipped-by-default live graph smoke target for the compliance gate.
  - Ran the MAVLink live graph smoke against SemStreams `configs/graph-backend.json` and JetStream NATS on
    2026-06-17; generated heartbeat and position frames wrote and read back source asset, track, source edge, and
    position state.
  - Added a COP ownership registration boundary and reran the smoke on a clean temporary NATS/SemStreams stack with
    typed owner tokens minted by SemStreams registry/bind results.
  - Added optional live-smoke metrics-delta checks for SemOps owner-token mismatch, foreign-edge, and
    indexing-profile-default counters.
  - Wired `cmd/semops` through `internal/app` so hosted startup connects to SemStreams, registers COP ownership,
    starts heartbeat, and composes the MAVLink adapter with typed owner tokens.
  - Added `Dockerfile`, `compose.cop.yml`, and `scripts/cop-stack-smoke.sh` for a one-command graph scaffold with
    NATS, SemStreams graph backend, SemOps runtime, active health/metrics polling, and the MAVLink live graph smoke.
  - Ran `bash scripts/cop-stack-smoke.sh` successfully on 2026-06-17; the script built images, started the stack,
    passed metrics-enabled MAVLink graph smoke, and tore the stack down.
  - Added MAVLink restart create-conflict reconciliation so an existing asset/track strict create response can be
    converted into a reprojected update path after process restart.
  - Migrated the hosted stack to SemStreams typed `ownership.OwnerToken` bind results and reran
    `bash scripts/cop-stack-smoke.sh` successfully on 2026-06-17.
  - Added hosted MAVLink UDP listener lifecycle wiring behind `SEMOPS_MAVLINK_UDP_LISTEN_ADDR`, with runtime cleanup
    tests and localhost UDP adapter tests.
  - Added `internal/api/cop` with a fixture-backed `GET /api/cop/snapshot` and `/healthz` handler for the first
    browser/API contract.
  - Added `semops-ui` and `caddy` services to `compose.cop.yml`; Caddy exposes the local COP on port 8080 and proxies
    `/api/*` plus `/healthz` to SemOps API on the same origin.
  - Extended `scripts/cop-stack-smoke.sh` to poll the direct API and the Caddy-routed UI/API path before running the
    MAVLink live graph smoke.
  - Added `cmd/semops-scenario-runner`, built it into the SemOps image, and added a `semops-scenario-runner` Compose
    service that runs the HADR replay once on startup and exposes `/healthz` plus `/scenario/status`.
  - Extended `scripts/cop-stack-smoke.sh` to poll the hosted scenario runner and assert the replay reached
    `state=succeeded` before running the hosted snapshot and direct live graph checks.
  - Added `TestHostedCOPSnapshotReflectsScenarioRunner` so the stack smoke proves the scenario runner's MAVLink,
    TAK/CoT, and CAP graph writes are visible through the Caddy-routed COP snapshot.
  - Moved SemStreams' dedicated health listener to container port 8081 in `compose.cop.yml` so it no longer races the
    service-manager HTTP port 8080, while keeping the host health URL on port 18080.
  - Added compose startup diagnostics to `scripts/cop-stack-smoke.sh` so NATS and SemStreams logs are printed when the
    stack fails to become healthy.
  - Ran `bash scripts/cop-stack-smoke.sh` successfully after adding the scenario runner service; the stack built the
    second binary, started the new container, waited for scenario success, ran hosted MAVLink/CoT snapshot checks, ran
    hosted scenario-runner snapshot checks, ran direct MAVLink/CoT/CAP live graph smokes, and tore down cleanly.
  - Diagnosed a local Docker Desktop resource failure where NATS JetStream reported `Max Storage: 0 B`; after pruning
    unused Docker build cache and moving SemStreams health to the non-conflicting listener port, reran
    `bash scripts/cop-stack-smoke.sh` successfully.

