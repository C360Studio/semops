remaining:
  - Keep ADS-B receiver/readsb/dump1090/ASTERIX paths, live OpenSky reliability, and credentialed provider access
    gated behind explicit live/provider evidence rather than the local fixture-backed HTTP component flow.
  - Keep SAPIENT graph projection limited to the reviewed absolute-location detection contract until product-service
    mode, harness qualification, tasking, association, UTM, range/bearing, and Apex/middleware behavior are reviewed.
  - Decide whether Phase 1 needs TCP/serial MAVLink transport variants or whether UDP plus replay is enough.
  - Wire the replay store into scenario-runner playback, retention policy, and durable restart checkpoint/read-back.
  - Capture provider-backed or public CAP samples before claiming live NWS/IPAWS or alert feed service support.
  - Add executable operator/API controls for scenario start, reset, pause, or resume only after checkpoint
    status/readback remains stable in full-stack smokes and the operator-control/auth/conflict gates are closed.
