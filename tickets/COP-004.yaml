remaining:
  - Wrap hosted MAVLink, TAK/CoT, ADS-B, hosted CAP if promoted, and future SAPIENT feed boundaries as SemStreams
    input and processor components with flowgraph edges, registered payloads, declared ports, and config schemas.
  - Decide whether Phase 1 needs TCP/serial MAVLink transport variants or whether UDP plus replay is enough.
  - Wire the replay store into scenario-runner playback, retention policy, and durable restart checkpoint/read-back.
  - Add hosted CAP polling/webhook transport if CAP needs to move beyond scenario replay for Phase 1.
  - Add operator/API controls for scenario start, reset, pause/resume, and expected-state checkpoints.
  - Add shared-airspace playback once ADS-B/SAPIENT feed boundaries exist.
