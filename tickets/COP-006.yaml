ticket: COP-006
title: Convert SemOps revival gaps into SemStreams upstream asks
assigned: technical-writer
depends_on: [COP-004, COP-005, COP-007, COP-008, COP-009]
blocks: []
status: ready
reviewer: architect
openspec_change: revive-cop-product

scope:
  - Track SemOps requirements that look framework-owned rather than product-owned.
  - Draft upstream issues for proven deployment manifests, escalation events, provenance/confidence conventions,
    spatial-temporal query helpers, raw-lane patterns, indexing-profile/cardinality helpers, and edge/core sync.
  - Keep each ask backed by a live SemOps demo need.

acceptance:
  - Every upstream ask cites a concrete SemOps workflow or failure mode.
  - Product-only SemOps behavior is not pushed into SemStreams prematurely.
  - Indexing-profile asks cite at least two feed fixtures showing that clean entity boundaries are insufficient.
  - Each upstream ask includes adversarial ownership-review notes.
  - The SemOps architecture doc links to the accepted upstream issues once created.

tdd:
  - Use demo evidence and failing contract gaps as the red state before proposing framework work.

progress:
  - SemStreams issue #302 delivered typed prefix-query request/response envelopes and opaque cursor pagination in the
    pinned `v1.0.0-beta.113` contract.
  - SemOps adopted that prefix pagination locally for graph-backed COP discovery and no longer treats `count == limit`
    as truncation unless SemStreams also reports continuation state.
  - SemStreams issue #309 tracks the component backpressure telemetry gap exposed by SemOps hosted feed migration:
    queue depth, drops, lag, retry/redelivery pressure, oldest pending age, and Prometheus mapping across
    `FlowMetrics`, `ProcessorMetrics`, `pkg/buffer`, NATS, and JetStream.
  - SemStreams issue #310 closed in `v1.0.0-beta.114` with `HTTPClientPort`, covering outbound HTTP method,
    URL/resource pattern, trigger port, auth reference, contact policy, and interface metadata.
  - Ran the 2026-06-27 upstream-ask adversarial ownership review and filed SemStreams issue #367 for graph-visible
    provenance/confidence/source-reference conventions. The same review deliberately deferred manifest/tier placement,
    escalation vocabulary, spatial-temporal query helpers, and indexing/cardinality helpers until their evidence gates
    produce sharper reusable framework pressure.

remaining:
  - Comment back on issue #302 after the SemOps PR lands with adoption evidence and any remaining total-count caveat.
  - Comment back on issue #309 after the CoT component-flow PR lands with the current SemOps evidence and any
    additional metrics needs found by MAVLink/CoT/CAP/ADS-B hosted smokes.
  - File a follow-up only if the first concrete CAP, ADS-B, or SAPIENT hosted polling/client component exposes a
    missing field or telemetry gap in `HTTPClientPort`.
  - Track SemStreams issue #367 and adopt any accepted provenance/confidence convention after it lands upstream.
  - Keep future upstream asks evidence-led; total-count metadata is deferred until large mixed-feed demos prove cursor
    pagination is insufficient.
