scope:
  - Update SemOps to the current SemStreams module path github.com/c360studio/semstreams.
  - Align the Go toolchain with the current SemStreams requirement.
  - Remove old StreamKit/BaseProcessor assumptions that no longer match SemStreams.
  - Retain only MAVLink references with clear extraction value.
  - Add a minimal compile gate before deeper feature work starts.
  - Treat SemStreams component lifecycle, flowgraph, payload registry, ports, config schema, health, and flow metrics
    as framework contracts for hosted feed services, not just graph ingest.

acceptance:
  - go test ./... reaches SemOps code compilation instead of failing on Go version or module path.
  - Remaining package failures are documented as concrete migration tickets.
  - No product architecture is built on deprecated SemStreams interfaces.
  - Hosted feed services use SemStreams input/processor component lifecycle, flowgraph, payload registry, and
    port/config schema patterns instead of a SemOps-local framework.

tdd:
  - Start with the failing compile as the red state.
  - Add the smallest contract test that imports current SemStreams projection and graph mutation packages.
  - Keep the contract test broad enough to catch lifecycle, flowgraph, payload-registry, port, and config-schema drift
    as hosted feeds mature.

progress:
  - Strengthened `internal/contracts/semstreams_contract_test.go` to cover SemStreams input components, processor
    components, flowgraph edges, registered `message.BaseMessage` payloads, network ingress ports, tappable stream
    output ports, graph mutation request ports, config schema, health, and flow metrics.
  - Added `internal/components/mavlink` with concrete UDP input, raw-frame decoder processor, graph projector
    processor, registered raw/decoded payloads, and flowgraph-connectable port metadata.
  - Rewired hosted MAVLink UDP startup to use SemStreams input/processor components rather than the old direct
    UDP-listener-to-adapter shortcut.
  - Added `internal/components/cot` with concrete UDP/TCP input components, raw-event decoder processor, graph
    projector processor, registered raw/decoded payloads, and flowgraph-connectable port metadata.
  - Rewired hosted TAK/CoT startup to use SemStreams input/processor components rather than the old direct
    UDP/TCP-listener-to-adapter shortcut.
  - Recorded that SemOps should prefer SemStreams utility packages such as `natsclient`, `pkg/errs`, `pkg/cache`,
    and `pkg/buffer` for common runtime concerns before adding local equivalents.
  - Recorded that flow backpressure decisions must be driven by component health, flow metrics, Prometheus telemetry,
    lag/drop/retry evidence, and replay/smoothing need before adding local buffers, caches, or JetStream durability.
  - Deleted stale `configs/robotics-flow.json` so old raw-subject flow topology cannot be mistaken for the current
    SemStreams component contract.
