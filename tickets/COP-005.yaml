remaining:
  - Add graph revisions or equivalent readback metadata to the selected-entity provenance lens.
  - Extend MapLibre/deck.gl layers beyond tracks, assets, and hazards to footprints, alert geometry, tasks, trails,
    and temporal playback.
  - Add real basemap/terrain source selection once the product has an offline/online tile policy.
  - Add accessibility/e2e checks for selection, inspector, source, and provenance flows.
