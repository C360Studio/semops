scope:
  - Maintain the feed validation and indexing ladder for MAVLink, TAK/CoT, CAP, CS API interop, ADS-B, SAPIENT,
    and KLV/STANAG 4609.
  - Track the demo/MVP lane and full product lane for each feed so narrow fixtures do not create dead-end
    architecture.
  - Record parser, mock, simulator, replay, compliance, and sample-data evidence before each feed enters the demo.
  - Define the expected SemStreams `indexing_profile` and cardinality risk for each projected entity type.
  - Keep SAPIENT and KLV as evidence-gated work until official SAPIENT parser/harness proof and KLV binary proof
    spikes exist.
  - Track framework-breaking graph gates separately from simulator fidelity when SemStreams changes write semantics.

acceptance:
  - Each feed has an explicit demo/MVP path, full product path, preserved boundary, and out-of-scope claim list.
  - MAVLink has generator, real-frame, ArduPilot SITL, and PX4 SITL or MAVSDK smoke gates documented.
  - MAVLink has a generated/replay live graph smoke gate for SemStreams ADR-055/056 must-exist compliance.
  - TAK/CoT has UDP/TCP fixture replay gates documented without claiming public conformance.
  - CAP has OASIS schema or consumer-rule validation plus NWS sample gates documented.
  - KLV has a small fixture plan proving metadata extraction, storage references, and memory-bounded handling.
  - SAPIENT has official BSI Flex 335 v2 protobuf, Dstl test-harness, sample-corpus, and middleware anchors recorded
    before parser or graph projection work starts.
  - Every feed has an explicit `indexing_profile` policy before graph writes are implemented.

tdd:
  - Treat missing mock, replay, compliance, or profile evidence as the red state for adapter implementation.
  - Add contract tests before broad feed expansion so high-cardinality native data cannot flood semantic indexes.

progress:
  - MAVLink has parser/generator, command codec, projection, graph writer, raw-lane, replay-store, adapter harness,
    structural wiring, and live generated-frame graph smoke evidence.
  - The 2026-06-17 live smoke used SemStreams `configs/graph-backend.json` and passed born-first graph readback for
    source asset, track, `cop.track.source`, and `cop.track.position`.
  - A clean-stack 2026-06-17 run registered SemOps COP ownership claims and used typed owner tokens minted by
    SemStreams registry/bind results for MAVLink writes.
  - The live smoke now accepts a SemStreams metrics URL and asserts zero SemOps-specific deltas for owner-token
    mismatch, foreign-edge, and indexing-profile-default counters.
  - `bash scripts/cop-stack-smoke.sh` carries those counter-delta assertions through the Docker Compose graph
    scaffold with NATS, SemStreams graph backend, and SemOps runtime.
  - TAK/CoT now has a SemOps-local native parser gate in `pkg/adapters/cot`, tested against SemLink-style operator,
    marker, GeoChat, air-track, classifier, and malformed-input fixtures.
  - TAK/CoT now has SemOps-owned bounded raw capture, JSON Lines replay storage, deterministic seed fixtures, and
    UDP/TCP fixture replay tests in `pkg/adapters/cot` and `internal/adapters/cot`.
  - TAK/CoT now has a pure SemStreams projection planner in `internal/projectors/cot` for born-first source
    assets/tracks, marker-to-task `control` state, GeoChat-to-advisory `content` state, source refs, and restart
    born-state reconciliation.
  - TAK/CoT now has a graph writer, adapter write path, NATS-backed stack constructor, and opt-in hosted runtime
    composition with UDP/TCP listener lifecycle behind `SEMOPS_COT_ENABLED`.
  - TAK/CoT now has an opt-in live graph smoke for track/task/advisory readback and a hosted UDP-to-Caddy-snapshot
    smoke path in the Compose stack.
  - Added `docs/feed-product-roadmap.md` so every feed carries an explicit demo/MVP lane, full product lane,
    preserved boundary, and not-claimed-yet list; TAK Server is tracked as future SemOps/SemStreams-backed service
    scope, with external TAK interoperability as part of the migration path.
  - Recorded the native core plus standards bridge positioning for CS API: native adapters remain first-class, while
    CS API ingress/egress is a bidirectional standards edge that preserves SemOps ownership, provenance, freshness,
    command authority, and indexing decisions.
  - Added a service-promotion matrix that keeps MAVLink, TAK/CoT, CAP, CS API, ADS-B, SAPIENT, and KLV adapters
    bounded until external protocol exposure, auth/session/federation, command/tasking, placement/scale, durable
    collaboration/replay, secrets, cost, or failure-domain forces justify a SemOps-owned service.
  - Anchored the CS API bridge gates to current OGC Connected Systems resource families: Part 1 feature resources and
    Part 2 dynamic data, with command/control input explicitly routed through SemOps command authority.
  - Added the first `internal/scenario` runner core so generated MAVLink, deterministic TAK/CoT seed events, and CAP
    lifecycle XML records replay through real adapter/projector seams with pollable status and false-green guardrails.
  - Added index-backed COP snapshot discovery for MAVLink, TAK/CoT, and CAP prefixes, removed required CoT/CAP seed
    ID defaults from the normal runtime path, and kept seed entity reads as family-scoped fallback when discovery is
    disabled, unavailable, or empty for that feed family.
  - Added source/type prefix-discovery diagnostics to the COP snapshot contract with returned count, query limit,
    cap-truncated pressure, and partial prefix-read error state.
  - Added source-health warning alerts for prefix discovery errors and truncation pressure.
  - Adopted SemStreams typed prefix discovery envelopes and opaque cursor pagination so snapshot discovery can page
    source/type prefixes up to the configured SemOps cap before reporting truncation pressure.
  - Added the first ADS-B executable boundary in `pkg/adapters/adsb`: OpenSky-shaped `/states/all` fixture parsing
    with nullable position fields, position-source quality, category preservation, and malformed-row rejection.
  - Added ADS-B current-state projection/readback evidence: `internal/projectors/adsb` emits source-partitioned
    signal-profile aircraft tracks with provenance/confidence/source refs, and the COP API discovers those tracks by
    graph prefix into `feed.adsb` health.
  - Added deterministic ADS-B replay evidence: `pkg/adapters/adsb` now emits OpenSky snapshot fixture records and
    JSONL replay records, while `internal/scenario` can replay ADS-B snapshots through parse, projection, graph-plan
    writing, and born-state marking.
  - Added hosted ADS-B adapter seam evidence: `internal/adapters/adsb` captures bounded raw snapshots, appends
    replay records, projects/writes graph plans, reconciles already-born tracks, and exposes health counters; stack
    wiring can use SemStreams NATS request/reply or an injected writer.
  - Added opt-in ADS-B structural scenario replay: `SEMOPS_SCENARIO_ADSB_FIXTURE=true` appends deterministic
    OpenSky-shaped snapshots to the hosted scenario runner, routes them through `internal/adapters/adsb`, and binds
    `semops.feed.adsb` only for that scenario path so graph writes use minted SemStreams owner tokens.
  - Corrected SAPIENT artifact discovery: GOV.UK, BSI Flex 335 v2, Dstl protobufs, the Dstl BSI Flex 335 v2 Test
    Harness, and Apex middleware are now recorded as official planning anchors. SemOps has not run the harness or
    implemented SAPIENT parsing yet.
  - Recorded the Dstl harness portability gap as product pressure: Windows-only, .NET 6, PostgreSQL 12 evidence is
    real but not Linux CI-friendly, so a portable SAPIENT preflight suite may be a future ecosystem contribution.

remaining:
  - Keep the baseline `message_type="unknown"` signal from becoming a global zero assertion as more feeds join.
  - Continue treating PX4/SITL or MAVSDK as feed-fidelity evidence, not as the born-first graph-compliance gate.
  - Run or qualify the Dstl SAPIENT test harness and add parser-only BSI Flex 335 v2 fixtures before any SAPIENT
    graph writes or compliance language.
  - Evaluate whether SemOps should create or contribute a portable SAPIENT preflight suite while preserving Dstl
    harness results as the official compliance anchor.
  - Revisit SemStreams total-count metadata only after large mixed-feed demos prove cursor paging plus truncation
    alerts are insufficient for operator/source-health decisions.
  - Decide whether ADS-B live mode starts with optional OpenSky, local receiver/readsb/dump1090 files, or a dedicated
    adapter service without making live network access the default path.
  - Implement the CS API bridge only after SemOps has enough stable structural graph state for meaningful ingress,
    egress, replay, and SemConnect conformance checks.
